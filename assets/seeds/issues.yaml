  - id: issue_ci_flaky
    title: CI が intermittent に失敗する
    body: |
      main ブランチの CI が高頻度で flaky failure になります。
      再実行で通るケースがあるため、失敗パターンの収集と再現条件の特定を行ってください。
    relative_point: 3
    cycle_id: cycle_20260302_1w
    status_id: todo
  - id: issue_api_latency
    title: API のレスポンスが遅い
    body: |
      一部エンドポイントで p95 レイテンシが 1.5s を超えています。
      ボトルネックを計測し、改善案と実装をお願いします。
    relative_point: 5
    cycle_id: cycle_20260302_2w
    status_id: in_progress
